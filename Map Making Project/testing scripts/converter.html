        function cleanAddress(address) {
            if (!address) return '';
            // Remove floor details, etc.
            let clean = address.replace(/\s+\d+층$/, '').replace(/\s+지층$/, '')
                               .replace(/\s+지하$/, '').replace(/\s+지하\s*\d+층$/, '')
                               .replace(/\s+지하\d+층$/, '')
                               .replace(/,.*$/, '') // Remove trailing commas
                               .trim();
            // Remove description text at the end
            // "서울 동대문구 이문로 54 1층 회기왕갈비탕" -> "서울 동대문구 이문로 54"
            clean = clean.replace(/(경희대학교\s+)?경영대(학)?$/, '')
                         .replace(/(경희대학교\s+)?호텔관광대(학)?$/, '')
                         .replace(/(경희대학교\s+)?청운관$/, '')
                         .replace(/(경희대학교\s+)?푸른솔(문화관)?$/, '')
                         .replace(/회기왕갈비탕$/, '')
                         .replace(/고깃집도훈$/, '')
                         .trim();
            return clean;
        }

        function convertSingleAddress(addr) {
            return new Promise(resolve => {
                const cleaned = cleanAddress(addr);
                $.ajax({
                    method: "GET",
                    headers: { "appKey": TMAP_KEY },
                    url: "https://apis.openapi.sk.com/tmap/geo/convertAddress?version=1&format=json",
                    data: {
                        "searchTypCd": "NtoO",
                        "reqAdd": cleaned
                    },
                    success: function(response) {
                        try {
                            const c = response.ConvertAdd;
                            if (c) {
                                let res = c.upperDistName + " " + c.middleDistName + " " + c.legalLowerDistName;
                                if (c.legalDetailName) res += " " + c.legalDetailName;
                                if (c.primary) {
                                    res += " " + c.primary;
                                    if (c.secondary && c.secondary !== "0") {
                                        res += "-" + c.secondary;
                                    }
                                }
                                resolve(res);
                            } else {
                                resolve(addr);
                            }
                        } catch(e) {
                            resolve(addr);
                        }
                    },
                    error: function() {
                        resolve(addr);
                    }
                });
            });
        }

        function parseCSVLine(line) {
            const result = []; let cur = '', inQ = false;
            for (const ch of line) {
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            result.push(cur.trim());
            return result;
        }

        async function startConversion() {

            const mainLines = MAIN_CSV.trim().split('\n');
            const mainHeader = mainLines[0];
            const mainConvertedRows = [mainHeader];
            
            $("#status").text("Converting Main DB (" + (mainLines.length - 1) + " items)...");
            for (let i = 1; i < mainLines.length; i++) {
                const line = mainLines[i];
                if (!line) continue;
                const cols = parseCSVLine(line);
                const originalAddr = cols[cols.length - 1];
                const convertedAddr = await convertSingleAddress(originalAddr);
                cols[cols.length - 1] = convertedAddr;
                
                // Re-assemble columns with quotes where necessary
                const reassembled = cols.map(col => {
                    if (col.includes(',') || col.includes('"')) {
                        return '"' + col.replace(/"/g, '""') + '"';
                    }
                    return col;
                }).join(',');
                mainConvertedRows.push(reassembled);
                $("#status").text("Main DB Progress: " + i + " / " + (mainLines.length - 1));
                await new Promise(r => setTimeout(r, 100)); // Rate limiting
            }
            $("#mainResult").val(mainConvertedRows.join('\n'));

            // Process Cafe CSV
            const cafeLines = CAFE_CSV.trim().split('\n');
            const cafeHeader = cafeLines[0];
            const cafeConvertedRows = [cafeHeader];
            
            $("#status").text("Converting Cafe DB (" + (cafeLines.length - 1) + " items)...");
            for (let i = 1; i < cafeLines.length; i++) {
                const line = cafeLines[i];
                if (!line) continue;
                const cols = parseCSVLine(line);
                const originalAddr = cols[cols.length - 1];
                const convertedAddr = await convertSingleAddress(originalAddr);
                cols[cols.length - 1] = convertedAddr;
                
                const reassembled = cols.map(col => {
                    if (col.includes(',') || col.includes('"')) {
                        return '"' + col.replace(/"/g, '""') + '"';
                    }
                    return col;
                }).join(',');
                cafeConvertedRows.push(reassembled);
                $("#status").text("Cafe DB Progress: " + i + " / " + (cafeLines.length - 1));
                await new Promise(r => setTimeout(r, 100)); // Rate limiting
            }
            $("#cafeResult").val(cafeConvertedRows.join('\n'));
            $("#status").text("CONVERSION COMPLETE! COPY RESULTS BELOW.");
        }

        $(document).ready(() => {
            startConversion();
        });
    </script>
</body>
</html>
