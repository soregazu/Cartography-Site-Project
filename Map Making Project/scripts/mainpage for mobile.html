<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>오늘! 밥약? 뭐하지!? (Mobile)</title>
    <meta name="description" content="경희대학교 밥약 루트 플래너 - 모바일 버전 맛집 코스 추천">
    <link rel="icon" type="image/png" href="../images/favicon.png">

    <!-- TMAP Vector Map SDK (v3) -->
    <script
        src="https://apis.openapi.sk.com/tmap/vectorjs?version=1&appKey=BDiiaslsLB52AKyxydEkS5b2EfBWm3xy17Tj4iBm"></script>

    <!-- 구글 폰트 임포트 (Outfit & Noto Sans KR) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800;900&display=swap"
        rel="stylesheet">

    <style>
        /* ============ 파란 색 테마 변수 (BA STYLE) ============ */
        :root {
            --ba-blue: #12a6ff;
            --ba-blue-glow: rgba(18, 166, 255, 0.4);
            --ba-blue-light: #e8f5ff;
            --ba-blue-dark: #0f1c2c;
            --ba-bg-light: #f3f7fa;
            --ba-text-main: #18283d;
            --ba-text-sub: #7a8e9e;
            --ba-accent-pink: #ff3b77;
            --ba-accent-yellow: #ffd043;
            --ba-border-color: rgba(18, 166, 255, 0.25);
            --font-ba: 'Outfit', 'Noto Sans KR', sans-serif;
            --header-height: 56px;
            --nav-height: 64px;
        }

        /* ============ 리셋 & 기본 ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-ba);
            background: #000;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: fixed;
            /* 모바일 고무줄 스크롤 방지 */
        }

        /* ============ 헤더 ============ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 모바일은 로고 중앙 정렬이 더 정돈되어 보임 */
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-logo {
            height: 26px;
            cursor: pointer;
            object-fit: contain;
        }

        /* ============ 하단 탭바 네비게이션 ============ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: env(safe-area-inset-bottom);
            /* iOS 홈 바 영역 대응 */
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 100%;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s;
            position: relative;
        }

        .nav-item.active {
            color: var(--ba-blue);
        }

        .nav-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            transition: transform 0.2s ease;
        }

        .nav-icon svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .nav-item.active .nav-icon {
            transform: scale(1.08);
        }

        .nav-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* ============ 지도 ============ */
        #map-container {
            position: absolute;
            top: var(--header-height);
            bottom: var(--nav-height);
            left: 0;
            right: 0;
            z-index: 1;
        }

        #map_div {
            width: 100%;
            height: 100%;
        }

        /* ============ 배경 슬라이드쇼 ============ */
        .bg-slideshow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-slideshow img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        .bg-slideshow img.active {
            opacity: 1;
        }

        .bg-find {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .bg-find.visible {
            opacity: 1;
        }

        .bg-find img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ============ 오버레이 ============ */
        #app-container {
            position: absolute;
            top: var(--header-height);
            bottom: var(--nav-height);
            left: 0;
            right: 0;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* 파란색 오버레이 레이어 */
        #map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 28, 44, 0.5) 0%, rgba(18, 166, 255, 0.35) 100%);
            z-index: 2;
            transition: opacity 0.5s ease;
        }

        #map-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ============ 페이지 콘텐츠 ============ */
        #content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .page.active {
            pointer-events: auto;
        }

        .page.out-left {
            transform: translateX(-100vw);
            opacity: 0;
        }

        .page.off-right {
            transform: translateX(100vw);
            opacity: 0;
        }

        .page.center {
            transform: translateX(0);
            opacity: 1;
        }

        /* 페이지 1 텍스트 (모바일 최적화 크기) */
        .intro-line {
            font-weight: 900;
            font-size: 34px;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .intro-sub {
            margin-top: 24px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-subtitle {
            font-weight: 500;
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
        }

        .intro-logo {
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
        }

        /* 페이지 2 텍스트 (모바일 최적화 크기) */
        .p2-line {
            font-weight: 900;
            font-size: 34px;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .p2-options {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 280px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: auto;
        }

        .p2-opt {
            font-weight: 700;
            font-size: 18px;
            background: rgba(11, 26, 48, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .p2-opt:active {
            color: #ffd043;
            border-color: #ffd043;
            transform: scale(0.97);
            background: rgba(11, 26, 48, 0.95);
        }

        .p2-opt .arr {
            font-size: 14px;
            transition: transform 0.2s;
        }

        /* ============ 네비 버튼 (페이지 슬라이더) ============ */
        #nav-btn {
            position: absolute;
            bottom: 40px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #0b1a30;
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.3s;
        }

        #nav-btn:active {
            background: #122846;
        }

        #nav-btn.right {
            left: calc(50% - 28px);
            /* 모바일에서는 하단 중앙에 배치하는 것이 조작하기 수월함 */
        }

        #nav-btn.left {
            left: calc(50% - 28px);
            transform: rotate(-180deg);
        }

        #nav-btn img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        /* ============ 배너 (모바일 플로팅) ============ */
        #banner {
            position: absolute;
            top: calc(var(--header-height) + 14px);
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 340px;
            background: rgba(8, 16, 28, 0.95);
            border: 1.5px solid rgba(255, 208, 67, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 10px rgba(255, 208, 67, 0.15);
            padding: 10px 18px;
            border-radius: 20px;
            z-index: 900;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            font-size: 13px;
            pointer-events: none;
            animation: pulseGlow 2.5s infinite alternate;
        }

        /* ============ 모바일 바텀시트 (구 #sidebar) ============ */
        #sidebar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75vh;
            /* 화면의 75% 정도 차지 */
            background: rgba(247, 250, 252, 0.96);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px 24px 0 0;
            border-top: 4px solid var(--ba-blue);
            z-index: 1100;
            padding: 12px 20px 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -10px 30px rgba(15, 28, 44, 0.15);
            pointer-events: auto;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));

            /* 드래그 애니메이션 성능 개선을 위해 transform 사용 */
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }

        #sidebar.open {
            /* JS에서 translateY 값으로 직접 제어하므로 이 클래스는 fallback 또는 제거 대상 */
        }

        #sidebar.no-transition {
            transition: none !important;
        }

        /* 바텀시트용 상단 드래그바 장식 */
        .sheet-handle {
            width: 44px;
            height: 5px;
            background: #cbd5e0;
            border-radius: 3px;
            margin: 0 auto 10px auto;
            cursor: pointer;
            padding: 4px 0;
            /* 터치 영역 확장 */
            background-clip: content-box;
            touch-action: none;
            /* 드래그 중 기본 스크롤 등 방지 */
        }

        /* 드래그 제스처 타겟 영역 */
        .sheet-drag-area {
            touch-action: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            padding-bottom: 2px;
        }

        /* 상단 철제 클립 장식 (바텀시트 크기에 맞춰 정돈) */
        .sidebar-clip-deco {
            width: 80px;
            height: 14px;
            background: #b2c5d4;
            margin: 0 auto 4px auto;
            border-radius: 3px 3px 0 0;
            box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .sidebar-clip-deco::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 10px;
            width: 60px;
            height: 6px;
            background: #7d8f9f;
            border-radius: 1.5px;
        }

        .sb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--ba-blue);
            padding-bottom: 8px;
            position: relative;
        }

        .sb-header::after {
            content: 'MEAL ROUTE REPORT';
            position: absolute;
            bottom: -8px;
            left: 0;
            font-size: 7px;
            font-family: monospace;
            color: var(--ba-blue);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .sb-title {
            font-weight: 900;
            font-size: 17px;
            color: var(--ba-text-main);
            letter-spacing: -0.5px;
        }

        .sb-back {
            background: white;
            border: 1px solid var(--ba-blue);
            color: var(--ba-blue);
            padding: 4px 8px;
            cursor: pointer;
            font-family: var(--font-ba);
            font-weight: 800;
            font-size: 10px;
            transition: all 0.2s ease;
            clip-path: polygon(3px 0%, 100% 0%, calc(100% - 3px) 100%, 0% 100%);
        }

        .sb-back:active {
            background: var(--ba-blue);
            color: white;
        }

        .sb-desc {
            font-size: 11px;
            color: var(--ba-text-sub);
            line-height: 1.3;
            font-weight: 400;
            padding: 0 2px;
        }

        #sb-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 2px;
        }

        #sb-body::-webkit-scrollbar {
            width: 4px;
        }

        #sb-body::-webkit-scrollbar-track {
            background: transparent;
        }

        #sb-body::-webkit-scrollbar-thumb {
            background: rgba(18, 166, 255, 0.2);
            border-radius: 2px;
        }

        /* 사이드바 카드 */
        .card {
            background: white;
            border: 1px solid var(--ba-border-color);
            border-left: 4px solid var(--ba-blue);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            box-shadow: 0 2px 8px rgba(15, 28, 44, 0.03);
            transition: all 0.2s ease;
        }

        .card::before {
            content: '// MEAL PLANNER';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 7px;
            font-family: monospace;
            color: var(--ba-text-sub);
            opacity: 0.7;
        }

        .card.done {
            border-left-color: var(--ba-text-sub);
            background: var(--ba-bg-light);
        }

        .card.done::before {
            content: '// PROCESS: COMPLETED';
        }

        .card.highlight {
            border-left-color: var(--ba-accent-pink);
            background: #fffdfd;
        }

        .card.highlight::before {
            content: '// PROCESS: ACTIVE';
            color: var(--ba-accent-pink);
        }

        .card-label {
            font-size: 9px;
            font-weight: 800;
            color: var(--ba-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card.highlight .card-label {
            color: var(--ba-accent-pink);
        }

        .card.done .card-label {
            color: var(--ba-text-sub);
        }

        .card-value {
            font-size: 13px;
            font-weight: 700;
            color: var(--ba-text-main);
        }

        .step-head {
            font-size: 12px;
            font-weight: 950;
            color: var(--ba-text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 폼 요소 */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 10px;
            font-weight: 800;
            color: var(--ba-text-sub);
        }

        .sel {
            width: 100%;
            background: white;
            border: 1px solid var(--ba-border-color);
            border-radius: 4px;
            padding: 8px 12px;
            color: var(--ba-text-main);
            font-family: var(--font-ba);
            font-size: 12px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            height: 38px;
            /* 모바일 터치 최적화 */
        }

        /* 버튼 */
        .btn-primary {
            background: var(--ba-blue);
            color: #fff;
            border: none;
            padding: 12px;
            font-family: var(--font-ba);
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
            box-shadow: 0 2px 6px var(--ba-blue-glow);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:active {
            background: #008ee6;
            transform: scale(0.98);
        }

        .spot-btn {
            background: white;
            border: 1px solid var(--ba-border-color);
            border-left: 3.5px solid var(--ba-blue);
            color: var(--ba-text-main);
            padding: 10px 14px;
            cursor: pointer;
            font-family: var(--font-ba);
            font-weight: 800;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            clip-path: polygon(0% 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            height: 40px;
        }

        .spot-btn:active {
            background: var(--ba-blue-light);
            border-color: var(--ba-blue);
            transform: translateX(2px);
        }

        .badge {
            font-size: 8px;
            font-weight: 900;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .badge.start {
            background: var(--ba-blue);
            color: #fff;
        }

        .badge.end {
            background: var(--ba-accent-yellow);
            color: #000;
        }

        /* 토글 */
        .toggle-row {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            flex: 1;
            background: white;
            border: 1px solid var(--ba-border-color);
            color: var(--ba-text-main);
            padding: 10px;
            cursor: pointer;
            font-family: var(--font-ba);
            font-weight: 800;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s ease;
            clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
            height: 38px;
        }

        .toggle-btn:active {
            background: var(--ba-blue-light);
            border-color: var(--ba-blue);
            color: var(--ba-blue);
        }

        /* 경로 결과 노드 */
        .route-node {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            position: relative;
            padding-bottom: 14px;
        }

        .route-node::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 22px;
            bottom: -10px;
            width: 1.5px;
            background: var(--ba-border-color);
        }

        .route-node:last-child::before {
            display: none;
        }

        .node-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            min-width: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
            z-index: 2;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }

        .node-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
        }

        .node-name {
            font-weight: 800;
            font-size: 12px;
            color: var(--ba-text-main);
        }

        .node-addr {
            font-size: 10px;
            color: var(--ba-text-sub);
        }

        // ────────────────────────────────────
        //  CSV 파서
        // ────────────────────────────────────
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const hdr = parseCSVLine(lines[0]);
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                const vals = parseCSVLine(lines[i]);
                if (vals.length < hdr.length) continue;
                const obj = {};
                hdr.forEach((h, idx) => obj[h] = (vals[idx] || '').replace(/^\"|\"$/g, '').trim());
                rows.push(obj);
            }
            return rows;
        }
        function parseCSVLine(line) {
            const result = []; let cur = '', inQ = false;
            for (const ch of line.trim()) {
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            result.push(cur.trim());
            return result;
        }

        // ────────────────────────────────────

        // ────────────────────────────────────
        function cleanAddress(address) {
            if (!address) return '';
            let str = address.replace(/,/g, ' ').replace(/\s+/g, ' ').trim();
            const match = str.match(/^([가-힣]+\s+[가-힣]+\s+[가-힣A-Za-z0-9\(\)]+([로길동가리읍면])\s*\d+(-\d+)?)/);
            if (match) return match[1].trim();
            const matchNoNum = str.match(/^([가-힣]+\s+[가-힣]+\s+[가-힣A-Za-z0-9\(\)]+([로길동가리읍면]))/);
            if (matchNoNum) return matchNoNum[1].trim();
            return str;
        }

        function parseAddress(address) {
            const clean = cleanAddress(address);
            const parts = clean.split(/\s+/);
            return {
                city: parts[0] || '',
                district: (parts[1] || '').replace(/[구군시]$/, ''),
                dong: parts[2] || '',
                number: parts.slice(3).join(' ') || ''
            };
        }

        async function geocodeREST(address) {
            try {
                const cleaned = cleanAddress(address);
                const url = `https://apis.openapi.sk.com/tmap/geo/fullAddrGeo?version=1&format=json&coordType=WGS84GEO&fullAddr=${encodeURIComponent(cleaned)}`;
                const res = await fetch(url, {
                    method: 'GET',
                    headers: { 'appKey': TMAP_KEY }
                });
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const data = await res.json();
                const c = data?.coordinateInfo?.coordinate;
                if (c && c.length > 0) {
                    return {
                        lat: parseFloat(c[0].newLat || c[0].lat),
                        lng: parseFloat(c[0].newLon || c[0].lon)
                    };
                }
                return null;
            } catch (e) {
                console.error("geocodeREST fetch 실패:", e);
                return null;
            }
        }

        function geocodeSDK(address) {
            return new Promise(resolve => {
                const timer = setTimeout(() => resolve(null), 4000);
                try {
                    if (typeof Tmapv3 === 'undefined' || !Tmapv3.extension || !Tmapv3.extension.TData) {
                        resolve(null);
                        return;
                    }
                    const tData = new Tmapv3.extension.TData();
                    const addr = parseAddress(address);
                    const optionObj = { coordType: "WGS84GEO" };
                    const params = {
                        onComplete: function () {
                            clearTimeout(timer);
                            try {
                                const data = this._responseData;
                                const lon = parseFloat(data.coordinateInfo.lon);
                                const lat = parseFloat(data.coordinateInfo.lat);
                                if (lat && lon && !isNaN(lat) && !isNaN(lon)) resolve({ lat, lng: lon });
                                else resolve(null);
                            } catch { resolve(null); }
                        },
                        onProgress: function () { },
                        onError: function () {
                            clearTimeout(timer);
                            resolve(null);
                        }
                    };
                    tData.getGeoFromAddressJson(addr.city, addr.district, addr.dong, addr.number, optionObj, params);
                } catch {
                    clearTimeout(timer);
                    resolve(null);
                }
            });
        }

        async function geocode(address) {
            console.log(`[지오코딩 시도] 원본 주소: "${address}" -> 정제 주소: "${cleanAddress(address)}"`);
            let coord = await geocodeREST(address);
            if (coord) {
                console.log(`[지오코딩 성공] REST API 결과:`, coord);
                return coord;
            }
            console.log(`[지오코딩 백업] SDK TData 호출 시작...`);
            coord = await geocodeSDK(address);
            if (coord) {
                console.log(`[지오코딩 성공] SDK TData 결과:`, coord);
                return coord;
            }
            console.warn(`[지오코딩 실패] 모든 방법 실패 -> 추정 좌표 사용`);
            return null;
        }

        function drawPolyline(coords, color = '#00b4d8', weight = 5) {
            const path = coords.map(c => new Tmapv3.LatLng(c.lat, c.lng));

                strokeColor: color,
                strokeWeight: weight,

            });
            allPolylines.push(pl);

        function fitBounds(coords) {
            if (!map || coords.length === 0) return;
            try {
                const bounds = new Tmapv3.LatLngBounds();
                coords.forEach(c => bounds.extend(new Tmapv3.LatLng(c.lat, c.lng)));
                map.fitBounds(bounds);
            } catch {
                map.setCenter(new Tmapv3.LatLng(coords[0].lat, coords[0].lng));
                map.setZoom(16);
            }
        }

        async function onEndSelect(key) {
            S.end = key;
            S.step = 'calculating_route';
            renderSidebar();

            // 도착 마커 추가
            const endSpot = SPOTS[key];
            addIconMarker(endSpot.lat, endSpot.lng, endSpot.icon, 52);

            // 경로 포인트 구성: 출발 → 식당 → (카페) → 도착
            const startC = SPOTS[S.start];
            const endC = SPOTS[S.end];
            const waypoints = [S.restCoord];
            if (S.cafeCoord) waypoints.push(S.cafeCoord);

            // TMAP 보행자 경로 API 호출
            const routeData = await fetchPedestrianRoute(
                { lat: startC.lat, lng: startC.lng },
                { lat: endC.lat, lng: endC.lng },
                waypoints
            );

            if (routeData && routeData.features) {
                // 경로 그리기
                const coords = [];
                routeData.features.forEach(f => {
                    if (f.geometry.type === 'LineString') {
                        f.geometry.coordinates.forEach(c => coords.push({ lat: c[1], lng: c[0] }));
                    }
                    if (f.properties.totalTime) S.totalTime = f.properties.totalTime;
                    if (f.properties.totalDistance) S.totalDist = f.properties.totalDistance;
                });
                if (coords.length > 0) drawPolyline(coords, '#00b4d8', 5);
            } else {
                // 폴백: 직선 경로 + 거리 추정
                const allPts = [
                    { lat: startC.lat, lng: startC.lng },
                    S.restCoord,
                    ...(S.cafeCoord ? [S.cafeCoord] : []),
                    { lat: endC.lat, lng: endC.lng }
                ];
                drawPolyline(allPts, '#00b4d8', 5);
                S.totalDist = calcTotalDist(allPts);
                S.totalTime = Math.round((S.totalDist * 1.4) / (4000 / 60)); // 분→초
                S.totalTime *= 60;
            }

            // 지도 범위 맞추기
            const allCoords = [
                { lat: startC.lat, lng: startC.lng },
                S.restCoord,
                ...(S.cafeCoord ? [S.cafeCoord] : []),
                { lat: endC.lat, lng: endC.lng }
            ];
            fitBounds(allCoords);

            // 배너 숨기기
            document.getElementById('banner').style.display = 'none';

            S.step = 'route_complete';
            renderSidebar();
        }

        // ─── TMAP 보행자 경로 API ───
        async function fetchPedestrianRoute(start, end, via) {
            const passListStr = via.map(v => `${v.lng},${v.lat}`).join('_');
            try {
                const res = await fetch('https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'appKey': TMAP_KEY
                    },
                    body: JSON.stringify({
                        startX: start.lng.toString(),
                        startY: start.lat.toString(),
                        endX: end.lng.toString(),
                        endY: end.lat.toString(),
                        startName: encodeURIComponent('출발'),
                        endName: encodeURIComponent('도착'),
                        passList: passListStr,
                        reqCoordType: 'WGS84GEO',
                        resCoordType: 'WGS84GEO'
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                console.warn('보행자 경로 API 실패, 직선 폴백 사용:', e.message);
                return null;
            }
        }

        // 거리 계산 (하버사인)
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p = Math.PI / 180;
            const a = Math.sin((lat2 - lat1) * p / 2) ** 2 +
                Math.cos(lat1 * p) * Math.cos(lat2 * p) * Math.sin((lon2 - lon1) * p / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
        function calcTotalDist(pts) {
            let d = 0;
            for (let i = 1; i < pts.length; i++)
                d += haversine(pts[i - 1].lat, pts[i - 1].lng, pts[i].lat, pts[i].lng);
            return d;
        }

        // ─── 플로우 리셋 ───
        function resetFlow() {
            S.step = 'select_start';
            S.start = null; S.menuType = null; S.timeSlot = null;
            S.restaurant = null; S.restCoord = null;
            S.wantCafe = null; S.cafePrice = null;
            S.cafe = null; S.cafeCoord = null;
            S.end = null; S.totalTime = 0; S.totalDist = 0;

            showLocationMarkers();
            document.getElementById('banner').style.display = 'flex';
            document.getElementById('banner-text').textContent = '출발 지점을 선택하세요';
            renderSidebar();
        }

        // ─── 페이지 네비게이션 & 애니메이션 (탭바 연동) ───
        function goPage(n) {
            if (n === curPage) return;

            const app = document.getElementById('app-container');
            const sidebar = document.getElementById('sidebar');
            const banner = document.getElementById('banner');

            // 탭바 active 상태 갱신
            document.getElementById('navHome').classList.toggle('active', n === 1);
            document.getElementById('navFind').classList.toggle('active', n === 2);

            // 페이드 전환
            app.style.opacity = '0';

            // 페이지 3(지도 찾기)에서 나갈 때 정리
            if (curPage === 3) {
                updateSheetPosition(STATE_CLOSED);
                banner.style.display = 'none';
                clearAll();
            }

            setTimeout(() => {
                applyPageState(n);
                app.style.opacity = '1';
            }, 300);

            curPage = n;
        }

        function applyPageState(n) {
            const p1 = document.getElementById('page1');
            const p2 = document.getElementById('page2');
            const overlay = document.getElementById('map-overlay');
            const sidebar = document.getElementById('sidebar');
            const banner = document.getElementById('banner');
            const navBtn = document.getElementById('nav-btn');

            const bgSlideshow = document.getElementById('bg-slideshow');
            const bgFind = document.getElementById('bg-find');

            if (n === 1) {
                p1.className = 'page center active';
                p2.className = 'page off-right';
                overlay.classList.remove('hidden');
                updateSheetPosition(STATE_CLOSED);
                banner.style.display = 'none';
                navBtn.style.display = 'flex';
                navBtn.className = 'right';
                navBtn.style.transform = '';
                // 배경: HOME 슬라이드쇼 표시, FIND 숨김
                bgSlideshow.style.opacity = '1';
                bgFind.classList.remove('visible');
                startSlideshow();
                runP1Anim();
            } else if (n === 2) {
                p1.className = 'page out-left';
                p2.className = 'page center active';
                overlay.classList.remove('hidden');
                updateSheetPosition(STATE_CLOSED);
                banner.style.display = 'none';
                navBtn.style.display = 'flex';
                navBtn.className = 'left';
                navBtn.style.transform = 'rotate(-180deg)';
                // 배경: FIND 이미지 표시, HOME 슬라이드쇼 숨김
                bgSlideshow.style.opacity = '0';
                stopSlideshow();
                bgFind.classList.add('visible');
                runP2Anim();
            } else if (n === 3) {
                p1.className = 'page out-left';
                p2.className = 'page off-right';
                overlay.classList.add('hidden');
                navBtn.style.display = 'none';
                // 배경: 지도 페이지에서는 배경 모두 숨김
                bgSlideshow.style.opacity = '0';
                stopSlideshow();
                bgFind.classList.remove('visible');
                // 지도 초기화 (최초 1회)
                initMap();
                // 바텀시트 & 배너 표시
                setTimeout(() => {
                    updateSheetPosition(STATE_HALF); // 모바일 지도를 탐색하기 편하도록 최초 노출은 Half(중간) 상태로 시작
                    banner.style.display = 'flex';
                    // 출발지 마커 표시 & 초기 바텀시트
                    resetFlow();
                }, 200);
            }
        }

        function togglePage() {
            if (curPage === 1) goPage(2);
            else if (curPage === 2) goPage(1);
        }

        function selectBranch(branch) {
            S.branch = branch;
            const title = document.getElementById('sb-title');
            const desc = document.getElementById('sb-desc');
            if (branch === 'category') {
                title.textContent = '종류별로 찾기';
                desc.textContent = '메뉴 종류를 골라 밥약 코스를 추천받으세요.';
            } else if (branch === 'time') {
                title.textContent = '시간대로 찾기';
                desc.textContent = '약속 시간대에 맞는 밥약 코스를 추천합니다.';
            } else if (branch === 'reset') {
                title.textContent = '처음부터 찾기';
                desc.textContent = '모든 조건을 직접 설정하여 맞춤 코스를 추천받으세요.';
            }
            // 탭바 상태 해제 (상세 찾기 진입 시)
            document.getElementById('navHome').classList.remove('active');
            document.getElementById('navFind').classList.remove('active');
            goPage(3);
        }

        // ─── 페이지 애니메이션 ───
        function runP1Anim() {
            const els = [document.querySelector('.l1'), document.querySelector('.l2'),
            document.querySelector('.l3'), document.querySelector('.intro-sub')];
            els.forEach(el => { if (el) { el.style.opacity = '0'; el.style.transform = 'translateY(20px)'; el.style.transition = 'none'; } });
            setTimeout(() => {
                els.forEach(el => { if (el) el.style.transition = 'opacity .6s cubic-bezier(.25,1,.5,1), transform .6s cubic-bezier(.25,1,.5,1)'; });
                [100, 500, 900, 1300].forEach((d, i) => {
                    setTimeout(() => { if (els[i]) { els[i].style.opacity = '1'; els[i].style.transform = 'translateY(0)'; } }, d);
                });
            }, 50);
        }

        function runP2Anim() {
            const els = [document.querySelector('.q1'), document.querySelector('.q2'),
            document.querySelector('.p2-options')];
            els.forEach(el => { if (el) { el.style.opacity = '0'; el.style.transform = 'translateY(20px)'; el.style.transition = 'none'; } });
            setTimeout(() => {
                els.forEach(el => { if (el) el.style.transition = 'opacity .6s cubic-bezier(.25,1,.5,1), transform .6s cubic-bezier(.25,1,.5,1)'; });
                [100, 500, 900].forEach((d, i) => {
                    setTimeout(() => { if (els[i]) { els[i].style.opacity = '1'; els[i].style.transform = 'translateY(0)'; } }, d);
                });
            }, 50);
        }

        // ─── 배경 슬라이드쇼 ───
        let slideshowTimer = null;
        let slideshowIdx = 0;

        function startSlideshow() {
            stopSlideshow();
            slideshowTimer = setInterval(() => {
                const imgs = document.querySelectorAll('#bg-slideshow img');
                imgs[slideshowIdx].classList.remove('active');
                slideshowIdx = (slideshowIdx + 1) % imgs.length;
                imgs[slideshowIdx].classList.add('active');
            }, 3000);
        }

        function stopSlideshow() {
            if (slideshowTimer) {
                clearInterval(slideshowTimer);
                slideshowTimer = null;
            }
        }

        // ─── 바텀시트 상태 및 높이 제어 ───
        const STATE_EXPANDED = 'expanded';
        const STATE_HALF = 'half';
        const STATE_COLLAPSED = 'collapsed';
        const STATE_CLOSED = 'closed';

        let curSheetState = STATE_CLOSED;

        function getSheetY(state) {
            const h = window.innerHeight;
            const sheetHeight = h * 0.75; // 75vh
            switch (state) {
                case STATE_EXPANDED:
                    return 0;
                case STATE_HALF:
                    return sheetHeight - h * 0.38; // 화면 하단에서 38vh 노출되도록
                case STATE_COLLAPSED:
                    return sheetHeight - 75; // 화면 하단에서 75px 노출 (핸들과 타이틀바 영역)
                case STATE_CLOSED:
                default:
                    return sheetHeight; // 화면 아래로 완전히 숨김
            }
        }

        function updateSheetPosition(state, transition = true) {
            const sidebar = document.getElementById('sidebar');
            if (!sidebar) return;

            curSheetState = state;
            const y = getSheetY(state);

            if (transition) {
                sidebar.classList.remove('no-transition');
            } else {
                sidebar.classList.add('no-transition');
            }

            sidebar.style.transform = `translateY(${y}px)`;
        }

        // ─── 드래그 제스처 바인딩 ───
        function initBottomSheetGesture() {
            const sidebar = document.getElementById('sidebar');
            const dragArea = document.querySelector('.sheet-drag-area');
            const handle = document.querySelector('.sheet-handle');
            if (!sidebar || !dragArea) return;

            let startY = 0;
            let startTranslateY = 0;
            let currentTranslateY = 0;
            let isDragging = false;
            let startTime = 0;

            // 드래그 시작 함수
            function onDragStart(y) {
                isDragging = true;
                startY = y;
                startTime = Date.now();

                // 현재 적용되어 있는 transform Y 값 추출
                const style = window.getComputedStyle(sidebar);
                const matrix = new WebKitCSSMatrix(style.transform);
                startTranslateY = matrix.m42; // translateY 위치값

                sidebar.classList.add('no-transition');
            }

            // 드래그 중 함수
            function onDragMove(y) {
                if (!isDragging) return;
                const deltaY = y - startY;
                currentTranslateY = startTranslateY + deltaY;

                // 최상단 임계치 (0) 및 최하단 임계치 (시트 총 높이) 설정
                const h = window.innerHeight;
                const sheetHeight = h * 0.75;
                if (currentTranslateY < 0) {
                    // 고무줄 효과 (위로 당길 때 덜 당겨지도록)
                    currentTranslateY = currentTranslateY * 0.2;
                } else if (currentTranslateY > sheetHeight) {
                    currentTranslateY = sheetHeight;
                }

                sidebar.style.transform = `translateY(${currentTranslateY}px)`;
            }

            // 드래그 종료 함수
            function onDragEnd(y) {
                if (!isDragging) return;
                isDragging = false;
                sidebar.classList.remove('no-transition');

                const deltaY = y - startY;
                const duration = Date.now() - startTime;
                const velocity = deltaY / duration; // 드래그 속도 (px/ms)

                let targetState = curSheetState;

                // 속도가 빠르면 플릭(Flick) 제스처로 인정하여 다음 상태로 스냅
                if (Math.abs(velocity) > 0.3) {
                    if (velocity < 0) {
                        // 위로 쓸어 올림
                        if (curSheetState === STATE_COLLAPSED) targetState = STATE_HALF;
                        else if (curSheetState === STATE_HALF) targetState = STATE_EXPANDED;
                        else targetState = STATE_EXPANDED;
                    } else {
                        // 아래로 쓸어 내림
                        if (curSheetState === STATE_EXPANDED) targetState = STATE_HALF;
                        else if (curSheetState === STATE_HALF) targetState = STATE_COLLAPSED;
                        else targetState = STATE_COLLAPSED;
                    }
                } else {
                    // 속도가 느리면 가장 가까운 좌표로 스냅
                    const yExpanded = getSheetY(STATE_EXPANDED);
                    const yHalf = getSheetY(STATE_HALF);
                    const yCollapsed = getSheetY(STATE_COLLAPSED);

                    const distExpanded = Math.abs(currentTranslateY - yExpanded);
                    const distHalf = Math.abs(currentTranslateY - yHalf);
                    const distCollapsed = Math.abs(currentTranslateY - yCollapsed);

                    const minDist = Math.min(distExpanded, distHalf, distCollapsed);
                    if (minDist === distExpanded) targetState = STATE_EXPANDED;
                    else if (minDist === distHalf) targetState = STATE_HALF;
                    else targetState = STATE_COLLAPSED;
                }

                updateSheetPosition(targetState, true);
            }

            // 드래그 핸들 탭 시 상태 순환 전환 (Collapsed -> Half -> Expanded -> Collapsed)
            let isClickTriggered = false;
            handle.addEventListener('click', (e) => {
                e.stopPropagation();

                // 단말기 오동작 방지
                if (isClickTriggered) return;
                isClickTriggered = true;
                setTimeout(() => isClickTriggered = false, 300);

                let nextState = STATE_HALF;
                if (curSheetState === STATE_COLLAPSED) {
                    nextState = STATE_HALF;
                } else if (curSheetState === STATE_HALF) {
                    nextState = STATE_EXPANDED;
                } else if (curSheetState === STATE_EXPANDED) {
                    nextState = STATE_COLLAPSED;
                }
                updateSheetPosition(nextState, true);
            });

            // 터치 이벤트 연결
            dragArea.addEventListener('touchstart', (e) => {
                // 클릭/탭 이벤트와 겹치지 않게 타겟 검사
                if (e.target === handle) return;
                onDragStart(e.touches[0].clientY);
            }, { passive: true });

            dragArea.addEventListener('touchmove', (e) => {
                onDragMove(e.touches[0].clientY);
            }, { passive: true });

            dragArea.addEventListener('touchend', (e) => {
                onDragEnd(e.changedTouches[0].clientY);
            }, { passive: true });

            // 마우스 이벤트 연결 (PC 디버깅용)
            dragArea.addEventListener('mousedown', (e) => {
                if (e.target === handle) return;
                onDragStart(e.clientY);

                const onMouseMove = (moveEvt) => onDragMove(moveEvt.clientY);
                const onMouseUp = (upEvt) => {
                    onDragEnd(upEvt.clientY);
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        // ─── 초기화 ───
        document.addEventListener('DOMContentLoaded', () => {
            loadDB();
            startSlideshow();
            runP1Anim();

            // 바텀시트 제스처 초기화
            initBottomSheetGesture();

            // 윈도우 리사이즈 대응
            window.addEventListener('resize', () => {
                if (curSheetState !== STATE_CLOSED) {
                    updateSheetPosition(curSheetState, false);
                }
            });
        });
    </script>
